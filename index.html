<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diário Bíblico · Escola SEMEAR</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ve: #3d5228; --vm: #4e6b32; --vl: #8dc63f; --vc: #b5d97a; --vp: #eef5e3;
  --br: #fafaf7; --tx: #2a2a1e; --tm: #6b7560;
}
body { background: var(--br); font-family: 'Lato', sans-serif; color: var(--tx); }
#app { max-width: 720px; margin: 0 auto; min-height: 100vh; }

.header { background: linear-gradient(135deg, #3d5228 0%, #4e6b32 60%, #5a7a38 100%); }
.header-inner { padding: 22px 24px 18px; position: relative; overflow: hidden; }
.header-inner::before { content: none; }
.header-inner::after { content: none; }
.header-titulo { font-family: 'Playfair Display', serif; font-size: 24px; color: #fff; font-weight: 600; letter-spacing: 0.3px; }
.header-subtitulo { font-size: 11px; color: var(--vc); letter-spacing: 2.5px; text-transform: uppercase; margin-top: 4px; }
.header-escola { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 8px; font-style: italic; }

.progresso-bar { background: rgba(255,255,255,0.12); height: 4px; }
.progresso-fill { height: 4px; background: var(--vl); transition: width 0.5s ease; }

.nav-tabs { display: flex; background: var(--ve); border-top: 1px solid rgba(255,255,255,0.08); }
.nav-tab { flex: 1; padding: 10px 6px; text-align: center; font-size: 11px; color: var(--vc); cursor: pointer; transition: all 0.2s; border: none; background: none; font-family: 'Lato', sans-serif; }
.nav-tab.active { color: var(--vl); border-bottom: 2px solid var(--vl); }
.nav-tab:hover:not(.active) { color: #fff; }
.tab-icon { font-size: 14px; display: block; margin-bottom: 2px; }
.content { padding: 18px; }

/* SPINNER */
.loading-box { text-align: center; padding: 40px 20px; }
.spinner { width: 32px; height: 32px; border: 3px solid #e0e8d0; border-top-color: var(--vl); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-txt { font-size: 14px; color: var(--tm); }

/* LITURGIA */
.aviso { background: #fff8e1; border: 1px solid #ffe082; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #7a5c10; margin-bottom: 12px; line-height: 1.5; }
.oracao-abertura { background: var(--vp); border-left: 3px solid var(--vl); border-radius: 0 8px 8px 0; padding: 12px 15px; margin-bottom: 14px; }
.oracao-abertura .label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--tm); display: block; margin-bottom: 5px; }
.oracao-abertura p { font-family: 'Playfair Display', serif; font-style: italic; font-size: 14px; color: var(--ve); line-height: 1.7; }

.liturgia-card { background: #fff; border: 1px solid #e0e8d0; border-radius: 12px; overflow: hidden; margin-bottom: 14px; }
.liturgia-header { background: var(--ve); padding: 14px 16px; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.liturgia-header h2 { font-family: 'Playfair Display', serif; font-size: 15px; color: #fff; font-weight: 600; line-height: 1.35; }
.liturgia-header .sub { font-size: 11px; color: var(--vc); margin-top: 3px; }
.cor-liturgica { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--vc); flex-shrink: 0; padding-top: 2px; }
.cor-dot { width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.3); flex-shrink: 0; }

.liturgia-body { padding: 16px; }
.tempo-info { display: flex; gap: 7px; margin-bottom: 14px; flex-wrap: wrap; }
.badge { font-size: 10px; padding: 3px 10px; border-radius: 20px; font-weight: 700; }
.badge-tempo { background: var(--vp); color: var(--ve); }

.leitura-section { margin-bottom: 18px; }
.leitura-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--tm); font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.leitura-label::after { content: ''; flex: 1; height: 1px; background: #e8eed8; }
.leitura-ref { font-size: 12px; color: var(--vm); font-weight: 700; margin-bottom: 7px; }
.leitura-intro { font-size: 12px; color: var(--tm); margin-bottom: 8px; font-style: italic; }
.leitura-texto { font-size: 14px; line-height: 1.9; color: var(--tx); font-family: 'Lato', sans-serif; font-style: normal; }
.salmo-resp { background: var(--vp); border-left: 3px solid var(--vl); padding: 8px 12px; border-radius: 0 6px 6px 0; margin: 6px 0 10px; font-size: 13px; font-style: italic; color: var(--ve); font-family: 'Playfair Display', serif; font-weight: 600; }

/* ETAPAS */
.etapa-card { background: #fff; border: 1px solid #e0e8d0; border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
.etapa-header { padding: 13px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
.etapa-num { width: 32px; height: 32px; border-radius: 50%; background: var(--vp); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--ve); flex-shrink: 0; }
.etapa-num.ativa { background: var(--ve); color: #fff; }
.etapa-num.concluida { background: var(--vl); color: var(--ve); }
.etapa-titulo h3 { font-size: 13px; font-weight: 700; color: var(--tx); letter-spacing: 0.3px; }
.etapa-titulo p { font-size: 12px; color: var(--tm); font-style: italic; margin-top: 1px; }
.etapa-body { padding: 0 16px 16px; }

.pergunta-destaque { background: var(--ve); border-radius: 8px; padding: 13px 16px; margin-bottom: 13px; text-align: center; }
.pergunta-destaque .nome-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--vc); font-weight: 700; display: block; margin-bottom: 6px; }
.pergunta-destaque .perg-txt { font-family: 'Playfair Display', serif; font-style: italic; font-size: 17px; color: #fff; line-height: 1.4; }

.etapa-body textarea { width: 100%; min-height: 120px; border: 1px solid #d0dbb8; border-radius: 8px; padding: 12px; font-size: 14px; font-family: 'Lato', sans-serif; color: var(--tx); resize: vertical; line-height: 1.65; background: var(--br); outline: none; transition: border-color 0.2s; }
.etapa-body textarea:focus { border-color: var(--vl); }
.etapa-texto-salvo { font-size: 14px; line-height: 1.75; color: var(--tx); background: var(--vp); padding: 12px; border-radius: 8px; min-height: 60px; white-space: pre-wrap; }

.btn-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.btn { padding: 7px 17px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; font-family: 'Lato', sans-serif; transition: all 0.2s; }
.btn-salvar  { background: var(--ve); color: #fff; }
.btn-salvar:hover  { background: var(--vm); }
.btn-editar  { background: var(--vp); color: var(--ve); border: 1px solid var(--vc); }
.btn-editar:hover  { background: var(--vc); }
.btn-deletar { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
.btn-deletar:hover { background: #fee2e2; }
.btn-voltar  { background: #f5f5f0; color: var(--tm); border: 1px solid #e0e0d8; }
.btn-voltar:hover  { background: #eceae2; }
.btn-proximo { background: var(--vl); color: var(--ve); }
.btn-proximo:hover { background: var(--vc); }
.btn-full { width: 100%; text-align: center; margin-top: 10px; display: block; }

/* DIÁRIO */
.diario-final { background: #fff; border: 1px solid #e0e8d0; border-radius: 12px; padding: 20px; }
.diario-final-header { text-align: center; border-bottom: 1px solid #e8eed8; padding-bottom: 14px; margin-bottom: 18px; }
.diario-final-header h2 { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--ve); font-weight: 600; }
.diario-final-header p { font-size: 12px; color: var(--tm); margin-top: 4px; }
.diario-etapa { margin-bottom: 18px; padding-bottom: 18px; border-bottom: 1px dashed #e0e8d0; }
.diario-etapa:last-of-type { border-bottom: none; margin-bottom: 0; }
.diario-etapa-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--vm); font-weight: 700; margin-bottom: 4px; }
.diario-etapa-pergunta { font-size: 12px; color: var(--tm); font-style: italic; margin-bottom: 8px; }
.diario-etapa-resposta { font-size: 14px; line-height: 1.8; color: var(--tx); font-family: 'Playfair Display', serif; }

.share-row { display: flex; gap: 8px; margin-top: 18px; justify-content: center; flex-wrap: wrap; }
.sucesso-msg { background: var(--vp); border: 1px solid var(--vc); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--ve); margin-top: 10px; display: none; text-align: center; }

/* HISTÓRICO */
.historico-item { background: #fff; border: 1px solid #e0e8d0; border-radius: 10px; padding: 13px 15px; margin-bottom: 9px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: space-between; }
.historico-item:hover { border-color: var(--vl); background: var(--vp); }
.historico-data { font-size: 13px; font-weight: 700; color: var(--ve); }
.historico-sub { font-size: 12px; color: var(--tm); margin-top: 2px; }
.historico-arrow { color: var(--vl); font-size: 20px; }

.empty-state { text-align: center; padding: 40px 18px; color: var(--tm); }
.empty-icon { font-size: 36px; margin-bottom: 12px; }
.btn-novo { background: var(--ve); color: #fff; border: none; border-radius: 24px; padding: 11px 26px; font-size: 14px; font-weight: 700; font-family: 'Lato', sans-serif; cursor: pointer; margin-top: 14px; transition: all 0.2s; }
.btn-novo:hover { background: var(--vm); }

/* GAMEFICAÇÃO */
.sequencia-bar {
  background: rgba(0,0,0,0.2);
  padding: 6px 24px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sequencia-chama {
  font-size: 18px;
  line-height: 1;
  transition: transform 0.3s;
}
.sequencia-chama.grande { font-size: 22px; }
.sequencia-texto {
  font-size: 12px;
  color: rgba(255,255,255,0.9);
  font-family: 'Lato', sans-serif;
  font-weight: 700;
}
.sequencia-sub {
  font-size: 10px;
  color: var(--vc);
  font-family: 'Lato', sans-serif;
  margin-left: auto;
}

.marco-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.marco-card {
  background: var(--ve);
  border-radius: 16px;
  padding: 32px 24px;
  text-align: center;
  max-width: 340px;
  width: 100%;
  border: 2px solid var(--vl);
}
.marco-icone { font-size: 48px; margin-bottom: 12px; }
.marco-dias {
  font-size: 48px;
  font-weight: 700;
  color: var(--vl);
  font-family: 'Playfair Display', serif;
  line-height: 1;
  margin-bottom: 8px;
}
.marco-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--vc);
  margin-bottom: 16px;
}
.marco-mensagem {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 16px;
  color: #fff;
  line-height: 1.6;
  margin-bottom: 24px;
}
.marco-btn {
  background: var(--vl);
  color: var(--ve);
  border: none;
  border-radius: 20px;
  padding: 10px 28px;
  font-size: 13px;
  font-weight: 700;
  font-family: 'Lato', sans-serif;
  cursor: pointer;
}

.versiculo-desbloqueado {
  background: linear-gradient(135deg, var(--ve) 0%, #2d3d1a 100%);
  border: 1px solid var(--vl);
  border-radius: 12px;
  padding: 20px;
  margin-top: 16px;
  text-align: center;
}
.versiculo-header {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--vl);
  font-weight: 700;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.versiculo-texto {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 15px;
  color: #fff;
  line-height: 1.7;
  margin-bottom: 8px;
}
.versiculo-ref {
  font-size: 11px;
  color: var(--vc);
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-inner">
      <div class="header-titulo">Diário Bíblico</div>
      <div class="header-subtitulo">Lectio Divina</div>
      <div class="header-escola">SEMEAR · Escola de Líderes Católicos</div>
    </div>
    <div class="sequencia-bar" id="sequencia-bar" style="display:none">
      <span class="sequencia-chama" id="seq-chama">🔥</span>
      <span class="sequencia-texto" id="seq-texto">1 dia seguido</span>
      <span class="sequencia-sub" id="seq-sub"></span>
    </div>
    <div class="progresso-bar"><div class="progresso-fill" id="progresso" style="width:0%"></div></div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="mudarAba('liturgia')"><span class="tab-icon">✝</span>Liturgia</button>
      <button class="nav-tab" onclick="mudarAba('lectio')"><span class="tab-icon">✍</span>Lectio</button>
      <button class="nav-tab" onclick="mudarAba('diario')"><span class="tab-icon">📖</span>Meu Diário</button>
      <button class="nav-tab" onclick="mudarAba('historico')"><span class="tab-icon">🗓</span>Histórico</button>
    </div>
  </div>
  <div class="content">
    <div id="aba-liturgia"></div>
    <div id="aba-lectio"   style="display:none"></div>
    <div id="aba-diario"   style="display:none"></div>
    <div id="aba-historico" style="display:none"></div>
  </div>
</div>

<script>
// ─── CONSTANTES ───────────────────────────────────────────────────────────────
const ETAPAS = [
  { nome:'LEITURA',      pergunta:'O que o texto diz?',        icone:'📖' },
  { nome:'MEDITAÇÃO',    pergunta:'O que o texto me diz?',     icone:'💭' },
  { nome:'ORAÇÃO',       pergunta:'O que eu digo ao texto?',   icone:'🙏' },
  { nome:'CONTEMPLAÇÃO', pergunta:'O que o texto faz em mim?', icone:'✨' }
];

// Fontes de liturgia em ordem de prioridade
const FONTES = [
  'https://liturgia.up.railway.app/',
  'https://liturgia.up.railway.app/dia',
  null // fallback offline
];

// ─── ESTADO ───────────────────────────────────────────────────────────────────
let liturgia = null;
let liturgiaCarregando = true;
let liturgiaErro = false;

let estado = {
  etapaAtiva: 0,
  respostas:  ['','','',''],
  salvas:     [false,false,false,false],
  editando:   [true,false,false,false]
};

// ─── UTILS ────────────────────────────────────────────────────────────────────
function hoje() {
  return new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function chaveHoje() {
  const d = new Date();
  return `diario_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;
}
function chaveLiturgiaHoje() {
  const d = new Date();
  return `liturgia_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;
}

// Limpa caches de liturgia de dias anteriores automaticamente
function limparCacheAntigo() {
  const chaveHojeStr = chaveLiturgiaHoje();
  const keysParaRemover = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith('liturgia_') && key !== chaveHojeStr) {
      keysParaRemover.push(key);
    }
  }
  keysParaRemover.forEach(k => localStorage.removeItem(k));
}
function corDot(cor) {
  const m = {branco:'#e8e8e8',verde:'#4CAF50',vermelho:'#e53935',roxo:'#7B1FA2',rosa:'#EC407A',preto:'#212121'};
  return m[(cor||'').toLowerCase()] || '#aaa';
}
function calcProgresso() {
  return Math.round((estado.salvas.filter(Boolean).length/4)*100);
}

// ─── PERSISTÊNCIA ─────────────────────────────────────────────────────────────
function salvarLocal() {
  localStorage.setItem(chaveHoje(), JSON.stringify({
    data: hoje(),
    respostas: estado.respostas,
    salvas: estado.salvas,
    liturgiaTitulo: liturgia ? liturgia.liturgia : ''
  }));
  let hist = JSON.parse(localStorage.getItem('historico_datas')||'[]');
  if (!hist.includes(chaveHoje())) {
    hist.unshift(chaveHoje());
    if (hist.length > 60) hist = hist.slice(0,60);
    localStorage.setItem('historico_datas', JSON.stringify(hist));
  }
}

function carregarEstado() {
  const raw = localStorage.getItem(chaveHoje());
  if (raw) {
    const d = JSON.parse(raw);
    estado.respostas = d.respostas || ['','','',''];
    estado.salvas    = d.salvas    || [false,false,false,false];
    estado.editando  = estado.salvas.map(s => !s);
    const p = estado.salvas.findIndex(s => !s);
    estado.etapaAtiva = p >= 0 ? p : 3;
  }
}

// ─── BUSCA DE LITURGIA ────────────────────────────────────────────────────────
async function buscarLiturgia() {
  // Tenta cache do dia primeiro
  const cached = localStorage.getItem(chaveLiturgiaHoje());
  if (cached) {
    try { return JSON.parse(cached); } catch(e) {}
  }

  // Fonte 1: API principal Railway
  try {
    const r = await fetch('https://liturgia.up.railway.app/', {
      signal: AbortSignal.timeout(10000)
    });
    if (!r.ok) throw new Error('falhou');
    const json = await r.json();
    if (json && json.primeiraLeitura) {
      localStorage.setItem(chaveLiturgiaHoje(), JSON.stringify(json));
      return json;
    }
  } catch(e) {}

  // Fonte 2: URL com data da mesma API
  try {
    const d = new Date();
    const url = `https://liturgia.up.railway.app/${d.getDate()}-${d.getMonth()+1}-${d.getFullYear()}`;
    const r = await fetch(url, { signal: AbortSignal.timeout(10000) });
    if (!r.ok) throw new Error('falhou');
    const json = await r.json();
    if (json && json.primeiraLeitura) {
      localStorage.setItem(chaveLiturgiaHoje(), JSON.stringify(json));
      return json;
    }
  } catch(e) {}

  // Fonte 3: API alternativa (fabioluciano/liturgia-diaria no Render)
  try {
    const d = new Date();
    const dia = String(d.getDate()).padStart(2,'0');
    const mes = String(d.getMonth()+1).padStart(2,'0');
    const ano = d.getFullYear();
    const url = `https://liturgia-diaria.onrender.com/${ano}-${mes}-${dia}`;
    const r = await fetch(url, { signal: AbortSignal.timeout(12000) });
    if (!r.ok) throw new Error('falhou');
    const json = await r.json();
    // Normaliza o formato para o padrão esperado pelo app
    if (json && (json.primeiraLeitura || json.primeira_leitura || json.leituras)) {
      const normalizado = normalizarLiturgia(json);
      if (normalizado) {
        localStorage.setItem(chaveLiturgiaHoje(), JSON.stringify(normalizado));
        return normalizado;
      }
    }
  } catch(e) {}

  return null;
}

// Normaliza diferentes formatos de API para o formato padrão do app
function normalizarLiturgia(json) {
  // Se já está no formato correto, retorna como está
  if (json.primeiraLeitura) return json;

  // Tenta mapear formato alternativo
  try {
    const normalizado = {
      liturgia: json.liturgia || json.titulo || json.feast || 'Liturgia do Dia',
      cor: json.cor || json.color || 'verde',
      tempo: json.tempo || json.season || '',
      primeiraLeitura: null,
      salmo: null,
      segundaLeitura: null,
      evangelho: null,
      oracaoColeta: json.oracaoColeta || json.oracao_coleta || json.collect || ''
    };

    // Mapeia leituras de formatos alternativos
    const leituras = json.leituras || json.readings || [];
    if (Array.isArray(leituras)) {
      leituras.forEach(l => {
        const tipo = (l.tipo || l.type || '').toLowerCase();
        const obj = {
          referencia: l.referencia || l.reference || l.ref || '',
          titulo: l.titulo || l.title || '',
          texto: l.texto || l.text || l.content || ''
        };
        if (tipo.includes('primeira') || tipo.includes('first') || tipo === '1') {
          normalizado.primeiraLeitura = obj;
        } else if (tipo.includes('salmo') || tipo.includes('psalm')) {
          normalizado.salmo = { ...obj, refrao: l.refrao || l.refrão || l.resposta || l.response || l.antifona || l.antífona || '', resposta: l.resposta || l.response || '' };
        } else if (tipo.includes('segunda') || tipo.includes('second') || tipo === '2') {
          normalizado.segundaLeitura = obj;
        } else if (tipo.includes('evangelho') || tipo.includes('gospel')) {
          normalizado.evangelho = obj;
        }
      });
    }

    if (normalizado.primeiraLeitura || normalizado.evangelho) return normalizado;
  } catch(e) {}

  return null;
}

// ─── NAVEGAÇÃO ────────────────────────────────────────────────────────────────
function mudarAba(aba) {
  ['liturgia','lectio','diario','historico'].forEach(a => {
    document.getElementById('aba-'+a).style.display = a===aba ? 'block' : 'none';
  });
  document.querySelectorAll('.nav-tab').forEach((t,i) => {
    t.classList.toggle('active', ['liturgia','lectio','diario','historico'][i]===aba);
  });
  if (aba==='lectio')    renderLectio();
  if (aba==='diario')    renderDiario();
  if (aba==='historico') renderHistorico();
}

// ─── RENDER LECTIO ────────────────────────────────────────────────────────────
function renderLectio() {
  const el = document.getElementById('aba-lectio');
  let html = '<div>';

  ETAPAS.forEach((etapa, i) => {
    const salva     = estado.salvas[i];
    const ativa     = i === estado.etapaAtiva;
    const editando  = estado.editando[i];
    const bloqueada = i > estado.etapaAtiva && !salva;
    let nc = 'etapa-num';
    if (salva)      nc += ' concluida';
    else if (ativa) nc += ' ativa';

    const pq = `<div class="pergunta-destaque">
      <span class="nome-lbl">${etapa.icone} ${etapa.nome}</span>
      <div class="perg-txt">(${etapa.pergunta})</div>
    </div>`;

    let corpo = '';
    if ((ativa || salva) && !bloqueada) {
      if (editando || !salva) {
        corpo = `<div class="etapa-body">${pq}
          <textarea id="txt-${i}" placeholder="Escreva aqui sua reflexão...">${estado.respostas[i]}</textarea>
          <div class="btn-row">
            <button class="btn btn-salvar" onclick="salvarEtapa(${i})">Salvar</button>
            ${i > 0 ? `<button class="btn btn-voltar" onclick="voltarEtapa(${i})">← Voltar</button>` : ''}
          </div></div>`;
      } else {
        corpo = `<div class="etapa-body">${pq}
          <div class="etapa-texto-salvo">${estado.respostas[i]}</div>
          <div class="btn-row">
            <button class="btn btn-editar"  onclick="editarEtapa(${i})">Editar</button>
            <button class="btn btn-deletar" onclick="deletarEtapa(${i})">Deletar</button>
            ${i > 0 ? `<button class="btn btn-voltar" onclick="voltarEtapa(${i})">← Voltar</button>` : ''}
            ${i < 3
              ? `<button class="btn btn-proximo" onclick="proximaEtapa(${i})">Próxima →</button>`
              : `<button class="btn btn-proximo" onclick="mudarAba('diario')">Ver Diário →</button>`}
          </div></div>`;
      }
    }

    html += `<div class="etapa-card">
      <div class="etapa-header" onclick="${bloqueada ? '' : `toggleEtapa(${i})`}">
        <div class="${nc}">${salva ? '✓' : i+1}</div>
        <div class="etapa-titulo">
          <h3>${etapa.icone} ${etapa.nome}</h3>
          <p>(${etapa.pergunta})</p>
        </div>
      </div>${corpo}</div>`;
  });

  html += '</div>';
  el.innerHTML = html;
  document.getElementById('progresso').style.width = calcProgresso() + '%';
}

function salvarEtapa(i) {
  const txt = document.getElementById('txt-'+i);
  if (!txt || !txt.value.trim()) return;
  estado.respostas[i] = txt.value.trim();
  estado.salvas[i]    = true;
  estado.editando[i]  = false;
  if (i < 3) estado.etapaAtiva = i+1;
  salvarLocal();
  renderLectio();
  atualizarSequenciaBar();
  // Se concluiu todas as etapas, verifica marcos
  if (estado.salvas.every(Boolean)) {
    verificarMarco();
  }
}
function editarEtapa(i)  { estado.editando[i]=true; renderLectio(); }
function deletarEtapa(i) { estado.respostas[i]=''; estado.salvas[i]=false; estado.editando[i]=true; estado.etapaAtiva=i; salvarLocal(); renderLectio(); }
function voltarEtapa(i)  { estado.etapaAtiva=i-1; renderLectio(); }
function proximaEtapa(i) { estado.etapaAtiva=i+1; renderLectio(); }
function toggleEtapa(i)  { estado.etapaAtiva=i;   renderLectio(); }

// ─── DIÁRIO ───────────────────────────────────────────────────────────────────
function montarTexto() {
  let txt = `DIÁRIO BÍBLICO — ${hoje()}\n`;
  if (liturgia) txt += `${liturgia.liturgia}\n`;
  txt += `Escola SEMEAR · Lectio Divina\n`;
  txt += `${'─'.repeat(42)}\n\n`;
  ETAPAS.forEach((e,i) => {
    if (estado.salvas[i]) {
      txt += `${e.nome}\n(${e.pergunta})\n\n${estado.respostas[i]}\n\n${'─'.repeat(42)}\n\n`;
    }
  });
  return txt.trim();
}

function renderDiario() {
  const el = document.getElementById('aba-diario');
  if (!estado.salvas.some(Boolean)) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">✍</div>
      <p style="font-size:14px">Seu diário de hoje ainda está em branco.</p>
      <button class="btn-novo" onclick="mudarAba('lectio')">Iniciar Lectio Divina</button>
    </div>`;
    return;
  }

  let html = `<div class="diario-final">
    <div class="diario-final-header">
      <h2>Diário Bíblico</h2>
      <p>${hoje()}${liturgia ? ' · ' + liturgia.liturgia : ''}</p>
    </div>`;

  ETAPAS.forEach((etapa,i) => {
    if (estado.salvas[i]) html += `
      <div class="diario-etapa">
        <div class="diario-etapa-label">${etapa.icone} ${etapa.nome}</div>
        <div class="diario-etapa-pergunta">(${etapa.pergunta})</div>
        <div class="diario-etapa-resposta">${estado.respostas[i]}</div>
      </div>`;
  });

  html += `
    <div class="share-row">
      <button class="btn btn-editar" onclick="copiarDiario()">📋 Copiar diário</button>
      <button class="btn btn-salvar" onclick="compartilharDiario()">↗ Compartilhar</button>
    </div>
    <div id="sucesso-copy" class="sucesso-msg">✓ Diário copiado! Cole onde quiser.</div>
    ${estado.salvas.every(Boolean) ? '<div id="versiculo-container"></div>' : ''}
  </div>`;

  el.innerHTML = html;
  // Mostrar versículo desbloqueado se todas as etapas concluídas
  if (estado.salvas.every(Boolean)) {
    const vc = document.getElementById('versiculo-container');
    if (vc) mostrarVersiculoDesbloqueado(vc);
  }
}

function copiarDiario() {
  const txt = montarTexto();
  const fallback = () => {
    const ta = document.createElement('textarea');
    ta.value = txt;
    ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
  };
  const ok = () => {
    const el = document.getElementById('sucesso-copy');
    if (el) { el.style.display='block'; setTimeout(()=>el.style.display='none',4000); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).then(ok).catch(()=>{ fallback(); ok(); });
  } else { fallback(); ok(); }
}

function compartilharDiario() {
  const txt = montarTexto();
  if (navigator.share) {
    navigator.share({ title:'Diário Bíblico · Escola SEMEAR', text:txt })
      .catch(() => copiarDiario());
  } else {
    copiarDiario();
  }
}

function renderHistorico() {
  const el = document.getElementById('aba-historico');
  const hist = JSON.parse(localStorage.getItem('historico_datas')||'[]');
  if (hist.length===0) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🗓</div>
      <p style="font-size:14px">Nenhum diário salvo ainda.</p>
      <button class="btn-novo" onclick="mudarAba('liturgia')">Ver Liturgia de Hoje</button>
    </div>`;
    return;
  }
  let html = '<div>';
  hist.forEach(chave => {
    const raw = localStorage.getItem(chave);
    if (!raw) return;
    const d = JSON.parse(raw);
    const s = d.salvas.filter(Boolean).length;
    html += `<div class="historico-item" onclick="abrirHistorico('${chave}')">
      <div>
        <div class="historico-data">📅 ${d.data}</div>
        <div class="historico-sub">${s} de 4 etapas · ${d.liturgiaTitulo||''}</div>
      </div>
      <div class="historico-arrow">›</div>
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

function abrirHistorico(chave) {
  const raw = localStorage.getItem(chave);
  if (!raw) return;
  const d = JSON.parse(raw);
  const el = document.getElementById('aba-historico');
  let html = `<button class="btn btn-voltar" style="margin-bottom:12px" onclick="renderHistorico()">← Histórico</button>
  <div class="diario-final">
    <div class="diario-final-header"><h2>Diário Bíblico</h2><p>${d.data}</p></div>`;
  ETAPAS.forEach((etapa,i) => {
    if (d.salvas[i]) html += `
      <div class="diario-etapa">
        <div class="diario-etapa-label">${etapa.icone} ${etapa.nome}</div>
        <div class="diario-etapa-pergunta">(${etapa.pergunta})</div>
        <div class="diario-etapa-resposta">${d.respostas[i]}</div>
      </div>`;
  });
  html += `
    <div class="share-row">
      <button class="btn btn-editar" onclick="copiarHistorico('${chave}')">📋 Copiar</button>
    </div>
    <div id="sucesso-hist" class="sucesso-msg">✓ Copiado!</div>
  </div>`;
  el.innerHTML = html;
}

function copiarHistorico(chave) {
  const raw = localStorage.getItem(chave);
  if (!raw) return;
  const d = JSON.parse(raw);
  let txt = `DIÁRIO BÍBLICO — ${d.data}\nEscola SEMEAR · Lectio Divina\n${'─'.repeat(42)}\n\n`;
  ETAPAS.forEach((e,i) => {
    if (d.salvas[i]) txt += `${e.nome}\n(${e.pergunta})\n\n${d.respostas[i]}\n\n${'─'.repeat(42)}\n\n`;
  });
  navigator.clipboard.writeText(txt.trim()).then(()=>{
    const el=document.getElementById('sucesso-hist');
    if(el){el.style.display='block';setTimeout(()=>el.style.display='none',3000);}
  });
}

function normalizarRef(ref) {
  if (!ref) return '';
  return ref
    .replace(/, /g, ',')
    .replace(/ ,/g, ',')
    .replace(/–/g, '-')
    .replace(/ - /g, '-')
    .replace(/ [.] /g, '.')
    .trim();
}

function completarRefSalmo(refAPI, refLeitura) {
  if (refAPI && refAPI.includes(',')) return refAPI;
  const r = refLeitura || '';
  const variantes = [
    r,
    normalizarRef(r),
    r.replace(/, /g, ','),
    r.replace(/,/g, ', '),
    r.replace(/; /g, ';'),
    r.replace(/;/g, '; '),
  ];
  for (const v of variantes) {
    if (v && SALMOS_REF[v]) return SALMOS_REF[v];
  }
  return refAPI || '';
}

function calcularSequencia() {
  const hist = JSON.parse(localStorage.getItem('historico_datas') || '[]');
  if (hist.length === 0) return 0;
  
  let sequencia = 0;
  const hoje = new Date();
  hoje.setHours(0,0,0,0);
  
  for (let i = 0; i < hist.length; i++) {
    const chave = hist[i];
    const partes = chave.split('_'); // diario_YYYY_M_D
    if (partes.length < 4) continue;
    
    const dataEntry = new Date(parseInt(partes[1]), parseInt(partes[2]), parseInt(partes[3]));
    dataEntry.setHours(0,0,0,0);
    
    const diffDias = Math.round((hoje - dataEntry) / (1000*60*60*24));
    
    // Verifica se o diário foi concluído (pelo menos uma etapa salva)
    const raw = localStorage.getItem(chave);
    if (!raw) continue;
    const d = JSON.parse(raw);
    const temConteudo = d.salvas && d.salvas.some(Boolean);
    if (!temConteudo) continue;
    
    if (diffDias === sequencia) {
      sequencia++;
    } else {
      break;
    }
  }
  return sequencia;
}

function totalDiasCompletos() {
  const hist = JSON.parse(localStorage.getItem('historico_datas') || '[]');
  return hist.filter(chave => {
    const raw = localStorage.getItem(chave);
    if (!raw) return false;
    const d = JSON.parse(raw);
    return d.salvas && d.salvas.every(Boolean);
  }).length;
}

  texto.textContent = seq === 1 ? '1 dia seguido' : `${seq} dias seguidos`;
  
  // Mensagem motivacional
  if (seq < 7) sub.textContent = `Faltam ${7 - seq} para o primeiro marco`;
  else if (seq < 21) sub.textContent = `Faltam ${21 - seq} para 21 dias`;
  else if (seq < 30) sub.textContent = `Faltam ${30 - seq} para 30 dias`;
  else if (seq < 60) sub.textContent = `Faltam ${60 - seq} para 60 dias`;
  else sub.textContent = `${seq} dias de fidelidade`;
}

function verificarMarco() {
  const total = totalDiasCompletos();
  const marcosAlvos = [7, 21, 30, 60];
  const marcosVistos = JSON.parse(localStorage.getItem('marcos_vistos') || '[]');
  
  for (const dias of marcosAlvos) {
    if (total >= dias && !marcosVistos.includes(dias)) {
      mostrarMarco(dias);
      marcosVistos.push(dias);
      localStorage.setItem('marcos_vistos', JSON.stringify(marcosVistos));
      break;
    }
  }
}

function mostrarMarco(dias) {
  const m = MARCOS[dias];
  if (!m) return;
  
  const overlay = document.createElement('div');
  overlay.className = 'marco-overlay';
  overlay.innerHTML = `
    <div class="marco-card">
      <div class="marco-icone">${m.icone}</div>
      <div class="marco-dias">${dias}</div>
      <div class="marco-label">dias com a Palavra</div>
      <div class="marco-mensagem">"${m.mensagem}"</div>
      <button class="marco-btn" onclick="this.closest('.marco-overlay').remove()">Amém</button>
    </div>`;
  document.body.appendChild(overlay);
}

function versiculoDoHoje() {
  const d = new Date();
  const idx = (d.getDate() + d.getMonth() * 31) % VERSICULOS.length;
  return VERSICULOS[idx];
}

function mostrarVersiculoDesbloqueado(container) {
  const v = versiculoDoHoje();
  const div = document.createElement('div');
  div.className = 'versiculo-desbloqueado';
  div.innerHTML = `
    <div class="versiculo-header">✨ Palavra desbloqueada</div>
    <div class="versiculo-texto">"${v.texto}"</div>
    <div class="versiculo-ref">${v.ref}</div>`;
  container.appendChild(div);
}

async function recarregarLiturgia() {
  localStorage.removeItem(chaveLiturgiaHoje());
  liturgiaCarregando = true;
  liturgia = null;
  renderLiturgia();
  liturgia = await buscarLiturgia();
  liturgiaCarregando = false;
  renderLiturgia();
}

// ─── INICIALIZAÇÃO ────────────────────────────────────────────────────────────
async function iniciar() {
  limparCacheAntigo();
  carregarEstado();
  renderLiturgia();
  liturgia = await buscarLiturgia();
  liturgiaCarregando = false;
  renderLiturgia();
  document.getElementById('progresso').style.width = calcProgresso() + '%';
  atualizarSequenciaBar();
  verificarMarco();
}

iniciar();
</script>
